name: Daily projections

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Slate date (YYYY-MM-DD), defaults to today"
        required: false
  schedule:
    # 14:00 UTC ≈ 10am ET: probables are set, early lines are up.
    # Note: scheduled runs only fire on the default branch.
    - cron: "0 14 * * *"

permissions:
  contents: write

jobs:
  project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          FANTASYPROS_API_KEY: ${{ secrets.FANTASYPROS_API_KEY }}
          BP_PARTNER_KEY: ${{ secrets.BP_PARTNER_KEY }}
          BP_USER: ${{ secrets.BP_USER }}
          BP_USER_KEY: ${{ secrets.BP_USER_KEY }}
        run: python scripts/run_daily.py ${{ inputs.date }}

      - name: Commit output
        run: |
          git config user.name "projections-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/output/latest.json
          git diff --cached --quiet || git commit -m "data: projections for $(date -u +%F)"
          git push
